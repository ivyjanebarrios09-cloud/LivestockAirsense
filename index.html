<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#2563eb" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" href="https://fzugmubaqmfjuxdvfnur.supabase.co/storage/v1/object/public/products/1000005269-removebg-preview%20(1).png" />
    <title>Livestock AirSense (LAS)</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          // Unregister old ones and register new minimal one
          navigator.serviceWorker.getRegistrations()
            .then((registrations) => {
              const promises = registrations.map(reg => reg.unregister());
              return Promise.all(promises);
            })
            .then(() => {
              navigator.serviceWorker.register('/sw.js');
            });
        });
      }
    </script>
  </body>
</html>
